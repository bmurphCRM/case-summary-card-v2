<template>
    <article class="csc-card" style={hostStyle}>
        <header class="csc-header">
            <div class="csc-title-row">
                <lightning-icon
                    icon-name="standard:case"
                    size="small"
                    class="csc-header-icon"
                ></lightning-icon>
                <h2 class="csc-title">{title}</h2>
            </div>
            <template lwc:if={subtitle}>
                <p class="csc-subtitle">{subtitle}</p>
            </template>
        </header>

        <template lwc:if={isLoading}>
            <div class="csc-state csc-state_loading">
                <lightning-spinner size="small" alternative-text="Loading"></lightning-spinner>
            </div>
        </template>

        <template lwc:elseif={hasError}>
            <div class="csc-state csc-state_error" role="alert">
                <lightning-icon icon-name="utility:error" size="small" variant="error"></lightning-icon>
                <span>{errorMessage}</span>
            </div>
        </template>

        <template lwc:elseif={hasData}>
            <div class="csc-tiles">
                <template for:each={tiles} for:item="tile">
                    <c-case-summary-tile
                        key={tile.id}
                        data-id={tile.id}
                        label={tile.label}
                        value={tile.value}
                        icon-name={tile.iconName}
                        clickable={tile.clickable}
                        ontileclick={handleTileClick}
                    ></c-case-summary-tile>
                </template>
            </div>
        </template>
    </article>
</template>
